name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - "package.json"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Publish
        run: npm publish --access public --provenance
